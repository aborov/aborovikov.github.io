  <style>
    :root {
      --font-header: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'Inter', sans-serif;
      --bg-red: #420202;
      --bg-card: rgba(15, 7, 7, 0.45);

    * {

      margin: 0;

    }

    body {
      padding: 40px 20px;
      background: linear-gradient(135deg, var(--bg-red) 0%, #170101 100%);

      display: flex;
      justify-content: center;

    .container {

      flex-direction: column;
      gap: 24px;
      width: 100%;
      max-width: 520px;
      text-align: center;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 40px 30px;
      border-radius: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .banner-image {

    .title-img {

    }

    .socials {

      gap: 16px;
      margin-bottom: 10px;
    }

    .social-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .social-icon:hover {
      transform: scale(1.1);
      filter: brightness(1.2);
    }

    .links-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-card {
      background-color: var(--link-bg);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      transition: transform 0.3s ease, background-color 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .link-card:hover {
      transform: translateY(-2px);
      background-color: #ffffff;
      box-shadow: 0 6px 20px rgba(252, 238, 237, 0.3);

    .link-card a {

  <script>
    // Dynamic subdomain rewriting for local/preview deployments
    document.addEventListener('DOMContentLoaded', () => {
      const hostname = window.location.hostname.toLowerCase();
      const isLocalOrPreview = 
        hostname.endsWith('.pages.dev') || 
        hostname === 'localhost' || 
        hostname === '127.0.0.1';
      
      if (isLocalOrPreview) {
        document.querySelectorAll('a').forEach(a => {
          try {
            const linkUrl = new URL(a.href);
            const linkHost = linkUrl.hostname.toLowerCase();
            if (linkHost === 'film.aborovikov.com') {
              // ccc bypass rule
              if (linkUrl.pathname.startsWith('/ccc')) {
                a.href = '/ccc' + linkUrl.pathname.substring(4) + linkUrl.search + linkUrl.hash;
              } else {
                a.href = '/film' + linkUrl.pathname + linkUrl.search + linkUrl.hash;
              }
            } else if (linkHost === 'dev.aborovikov.com') {
              a.href = '/dev' + linkUrl.pathname + linkUrl.search + linkUrl.hash;
            } else if (linkHost === 'brother.aborovikov.com') {
              a.href = '/brother' + linkUrl.pathname + linkUrl.search + linkUrl.hash;
            } else if (linkHost === 'aborovikov.com') {
              a.href = linkUrl.pathname + linkUrl.search + linkUrl.hash;
            }
          } catch (e) {
            // Ignored for relative/anchor links
          }
        });
      }
    });
  </script>
